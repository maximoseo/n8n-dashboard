services:
  - type: web
    name: n8n-dashboard
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SEO_AUDIT_BRIDGE
        value: "1"
      - key: NEXT_PUBLIC_BASE_PATH
        value: /n8n-app
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://wtpczvyupmavzrxisvcm.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: DASHBOARD_AUTH_USERNAME
        sync: false
      - key: DASHBOARD_AUTH_EMAIL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_TOKEN
        sync: false
      # --- n8n read-only sync + multi-instance monitoring ---
      # Legacy single-instance compatibility for existing routes.
      - key: N8N_BASE_URL
        value: https://websiseo.app.n8n.cloud
      - key: N8N_API_KEY
        sync: false
      # Named instance vars for the multi-instance probe and future poller.
      - key: N8N_INSTANCE_1_URL
        value: https://maximoseo.app.n8n.cloud
      - key: N8N_INSTANCE_1_API_KEY
        sync: false
      - key: N8N_INSTANCE_2_URL
        value: https://websiseo.app.n8n.cloud
      - key: N8N_INSTANCE_2_API_KEY
        sync: false
      # Server-only: lets the sync job persist cached metrics to Supabase.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Shared secret for machine-triggered sync (cron/CI -> POST /api/n8n/sync).
      - key: SYNC_SECRET
        sync: false
      # --- Optional feature integrations (command-center slices) ---
      - key: ANTHROPIC_API_KEY        # AI Builder / failure analysis
        sync: false
      - key: OPENAI_API_KEY           # AI fallback
        sync: false
      - key: TELEGRAM_BOT_TOKEN       # critical alerts
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false
      - key: RESEND_API_KEY           # email alerts/reports
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: N8N_SITE_PACK_WEBHOOK_URL # SEO pack orchestration
        sync: false
    autoDeploy: true
