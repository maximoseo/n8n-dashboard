services:
  - type: web
    name: n8n-dashboard
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://wtpczvyupmavzrxisvcm.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: DASHBOARD_AUTH_USERNAME
        sync: false
      - key: DASHBOARD_AUTH_EMAIL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_TOKEN
        sync: false
      # --- n8n read-only sync (added by command-center slice) ---
      - key: N8N_BASE_URL
        value: https://websiseo.app.n8n.cloud
      - key: N8N_API_KEY
        sync: false
      # Server-only: lets the sync job persist cached metrics to Supabase.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Shared secret for machine-triggered sync (cron/CI -> POST /api/n8n/sync).
      - key: SYNC_SECRET
        sync: false
    autoDeploy: true
