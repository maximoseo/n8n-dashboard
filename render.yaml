services:
  - type: web
    name: n8n-dashboard
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://wtpczvyupmavzrxisvcm.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: DASHBOARD_AUTH_USERNAME
        sync: false
      - key: DASHBOARD_AUTH_EMAIL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_URL
        sync: false
      - key: AUTH_RATE_LIMIT_REDIS_TOKEN
        sync: false
    autoDeploy: true
